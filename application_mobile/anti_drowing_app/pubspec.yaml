name: anti_drowing_app
description: "Emergency response mobile app for anti-drowning system"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP requests
  http: ^1.1.2
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # UI
  cupertino_icons: ^1.0.2
  
  # Maps
  google_maps_flutter: ^2.5.0
  
  # Location services
  location: ^5.0.3
  
  # URL launcher for Google Maps
  url_launcher: ^6.2.2
  
  # Page view for swipeable screens
  smooth_page_indicator: ^1.1.0
  
  # System-level notifications
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/